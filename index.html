<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VibeShift</title>
<script src="https://unpkg.com/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>body{background:#0a0a0a;color:#fff;font-family:system-ui;padding:20px}h1{font-size:42px;background:linear-gradient(90deg,#ff006e,#8338ec);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.card{background:#1a1a1a;padding:20px;border-radius:12px;margin:20px 0;max-width:500px}input{width:100%;padding:12px;margin:8px 0;background:#000;border:1px solid #333;color:#fff;border-radius:8px}button{width:100%;padding:12px;background:linear-gradient(90deg,#ff006e,#8338ec);border:none;color:#fff;border-radius:8px;font-weight:bold;cursor:pointer}.hidden{display:none}.colors{display:flex;gap:6px;margin:10px 0}.c{width:40px;height:40px;border-radius:6px}</style>
</head>
<body>
<h1>VibeShift</h1>
<p style="color:#888">Paste YouTube Short → Steal vibe</p>
<div id="auth" class="card">
<h2 id="at">Sign Up</h2>
<input id="em" placeholder="Email" type="email">
<input id="pw" placeholder="Password" type="password">
<button id="ab">Create Account</button>
<p id="tg" style="color:#a855f7;cursor:pointer;margin-top:10px;text-decoration:underline">Already have account? Login</p>
</div>
<div id="app" class="hidden">
<div class="card">
<input id="yt" placeholder="https://youtube.com/shorts/...">
<button id="an">Analyze Vibe</button>
<div id="rs" class="hidden" style="margin-top:15px">
<h3 id="tt"></h3>
<p>Vibe: <span id="vb"></span></p>
<div class="colors" id="cl"></div>
<img id="im" style="max-width:100%;border-radius:8px;margin-top:10px">
</div>
</div>
</div>
<script>
const S_URL="https://rzgrdamzgeyyotazrapz.supabase.co";
const S_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6Z3JkYW16Z2V5eW90YXpyYXB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDY4NTIsImV4cCI6MjA5MTMyMjg1Mn0.ilJX_ZDKPYr2vyTUvrymsMIEH15Oprsj6LoxohEWPbQ";
const AI="https://andrewcj999-vibeshift-ai.hf.space";
const sb = window.supabase.createClient(S_URL, S_KEY);
let isLogin = false;
document.getElementById('tg').onclick = ()=>{isLogin=!isLogin;document.getElementById('at').innerText=isLogin?'Login':'Sign Up';document.getElementById('ab').innerText=isLogin?'Login':'Create Account';document.getElementById('tg').innerText=isLogin?'Need account? Sign up':'Already have account? Login';};
document.getElementById('ab').onclick = async ()=>{const e=document.getElementById('em').value,p=document.getElementById('pw').value,b=document.getElementById('ab');b.disabled=true;try{const r=isLogin?await sb.auth.signInWithPassword({email:e,password:p}):await sb.auth.signUp({email:e,password:p});if(r.error)alert(r.error.message);else location.reload();}catch(err){alert(err.message)}b.disabled=false;};
(async()=>{const {data}=await sb.auth.getUser();if(data.user){document.getElementById('auth').classList.add('hidden');document.getElementById('app').classList.remove('hidden');}})();
document.getElementById('an').onclick = async ()=>{const url=document.getElementById('yt').value;if(!url)return alert('Paste URL');const b=document.getElementById('an');b.disabled=true;b.innerText='Analyzing...';try{const r=await fetch(AI+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({youtube_url:url})});const d=await r.json();document.getElementById('tt').innerText=d.title;document.getElementById('vb').innerText=d.vibe;document.getElementById('im').src=d.thumbnail;const cl=document.getElementById('cl');cl.innerHTML='';d.colors.forEach(c=>{const x=document.createElement('div');x.className='c';x.style.background=c;cl.appendChild(x)});document.getElementById('rs').classList.remove('hidden');const {data:{user}}=await sb.auth.getUser();await sb.from('styles').insert({user_id:user.id,name:d.title,youtube_url:url,vibe:d.vibe,colors:d.colors});}catch(e){alert('Error: '+e.message)}b.disabled=false;b.innerText='Analyze Vibe';};
</script>
</body>
</html>
